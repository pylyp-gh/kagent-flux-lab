# ⚠️⚠️⚠️ ANTI-PATTERN PRECEDENT WARNING ⚠️⚠️⚠️
#
# Цей файл — plain Kubernetes Secret з fake API key, committed plaintext у git.
# Це БЕЗПЕЧНО ТІЛЬКИ ТОМУ що value явно fake (placeholder, не реальний key).
#
# 🚨 КОЛИ ТОБІ ЗАМАНЕТЬСЯ ЗАМІНИТИ FAKE NA RAL KEY — STOP!
#    Real API keys ЗАВЖДИ йдуть через SealedSecret (див. scripts/30-seal.sh
#    та agentgateway-system/anthropic-secret як приклад). НІКОЛИ не commit
#    raw Secret з real credentials — потрапить у git history forever,
#    і rotate не очистить minor branches.
#
# Чому цей stub існує:
# kagent's chart enables 10 demo agents (helm-agent, k8s-agent, istio-agent, ...)
# що default'но використовували OpenAI provider через `default-model-config`
# ModelConfig (referencing Secret `kagent-openai`). Stub satisfies SDK init
# validation — pods init clean навіть без real key.
#
# Усі ці агенти у нашому lab переключені на `claude-via-gateway` ModelConfig
# через `controller.yaml` HelmRelease values override. Тобто цей Secret все ще
# referenced (ADK init grabs env vars з spec.apiKeySecret), але **реальна auth**
# до Anthropic інжектиться gateway-side через
# `agentgateway-system/anthropic-secret` (SealedSecret).
---
apiVersion: v1
kind: Secret
metadata:
  name: kagent-openai
  namespace: kagent
  annotations:
    purpose: |
      Lab-only placeholder for kagent ADK init validation.
      DO NOT use this pattern as template for real keys — use SealedSecret.
      Real Anthropic auth lives at agentgateway-system/anthropic-secret.
type: Opaque
stringData:
  # PLACEHOLDER — не справжній key. SDK init checks presence of env var, не format.
  OPENAI_API_KEY: "PLACEHOLDER-NOT-A-REAL-KEY-USE-SEALED-SECRET-IF-REAL"
