# ⚠️⚠️⚠️ ANTI-PATTERN PRECEDENT WARNING ⚠️⚠️⚠️
#
# This file is a plain Kubernetes Secret with a fake API key, committed plaintext to git.
# This is SAFE ONLY BECAUSE the value is explicitly fake (placeholder, not a real key).
#
# 🚨 IF YOU'RE TEMPTED TO REPLACE THE FAKE KEY WITH A REAL ONE — STOP!
#    Real API keys ALWAYS go via SealedSecret (see scripts/30-seal.sh
#    and agentgateway-system/anthropic-secret as an example). NEVER commit
#    a raw Secret with real credentials — it ends up in git history forever,
#    and rotating won't clean minor branches.
#
# Why this stub exists:
# kagent's chart enables 10 demo agents (helm-agent, k8s-agent, istio-agent, ...)
# that defaulted to the OpenAI provider via `default-model-config`
# ModelConfig (referencing Secret `kagent-openai`). Stub satisfies SDK init
# validation — pods init cleanly even without a real key.
#
# All these agents in our lab are switched to the `claude-via-gateway` ModelConfig
# via the `controller.yaml` HelmRelease values override. So this Secret is still
# referenced (ADK init grabs env vars from spec.apiKeySecret), but **real auth**
# to Anthropic is injected gateway-side via
# `agentgateway-system/anthropic-secret` (SealedSecret).
---
apiVersion: v1
kind: Secret
metadata:
  name: kagent-openai
  namespace: kagent
  annotations:
    purpose: |
      Lab-only placeholder for kagent ADK init validation.
      DO NOT use this pattern as template for real keys — use SealedSecret.
      Real Anthropic auth lives at agentgateway-system/anthropic-secret.
type: Opaque
stringData:
  # PLACEHOLDER — not a real key. SDK init checks presence of env var, not format.
  OPENAI_API_KEY: "PLACEHOLDER-NOT-A-REAL-KEY-USE-SEALED-SECRET-IF-REAL"
