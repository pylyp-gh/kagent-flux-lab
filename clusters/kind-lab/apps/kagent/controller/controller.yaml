---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
