---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  # Pin до 0.7.x — uniknayemo upstream label bug у 0.9.x (Chart.Version з '+' build metadata
  # потрапляє у metadata.labels що invalid для Kubernetes)
  ref:
    semver: ">=0.7.0 <0.9.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    semver: ">=0.7.0 <0.9.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    # --- Disable всі pre-built demo agents (≈2.5GB memory) ---
    agents:
      argo-rollouts-agent: { enabled: false }
      cilium-debug-agent: { enabled: false }
      cilium-manager-agent: { enabled: false }
      cilium-policy-agent: { enabled: false }
      helm-agent: { enabled: false }
      istio-agent: { enabled: false }
      k8s-agent: { enabled: false }
      kgateway-agent: { enabled: false }
      observability-agent: { enabled: false }
      promql-agent: { enabled: false }

    # --- Disable supporting subcharts ми не використовуємо ---
    # (correct top-level subchart paths, не nested через 'tools')
    kmcp:
      enabled: false
    kagent-tools:
      enabled: false
    querydoc:
      replicas: 0
    grafana-mcp:
      enabled: false
