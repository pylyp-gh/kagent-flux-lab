---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    # 🔒 TODO (supply chain): pin до digest для prod. OCI tags mutable.
    # crane digest oci://ghcr.io/kagent-dev/kagent/helm/kagent:0.9.2
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    # 🔒 TODO (supply chain): pin до digest для prod. OCI tags mutable.
    # crane digest oci://ghcr.io/kagent-dev/kagent/helm/kagent:0.9.2
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
  # Workaround chart bug: Helm OCI digest суфікс рендериться у label + image tag → invalid '+'.
  # postRenderer fixes labels (replace empty), images (Kustomize images: override).
  postRenderers:
    - kustomize:
        images:
          - name: cr.kagent.dev/kagent-dev/kagent/controller
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/ui
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/app
            newTag: "0.9.2"
        patches:
          - target:
              kind: '.*'
              labelSelector: 'app.kubernetes.io/version'
            patch: |
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: ""
          # Agent trust injection (SSL_CERT_FILE + lab-ca-bundle volume) винесено
          # у окремий файл apps/kagent/config/agent-trust-patches.yaml.
          # Причина: postRenderer на kagent HelmRelease рендерить deployment field
          # у manifest, але helm-controller SSA не клаїмить ownership за нього →
          # kagent controller's наступний client-side Update drops field.
          # Через окремий Flux Kustomization (kagent-config) kustomize-controller
          # клаїмить ownership власним field manager — конфлікт-free, persistent.
  values:
    # Global tag override — chart's template default falls back to це
    tag: "0.9.2"
    # Explicit overrides per known component (belt-and-suspenders)
    controller:
      image:
        tag: "0.9.2"
      agentImage:
        tag: "0.9.2"
    # Override modelConfig для всіх chart-managed agents — ходять через
    # agentgateway (claude-via-gateway → Anthropic Claude). Default був
    # default-model-config (real OpenAI, stub key fail), що марно.
    # Тепер кожен з 10 default agents має робочий backend через gateway.
    k8s-agent:
      modelConfigRef: claude-via-gateway
    helm-agent:
      modelConfigRef: claude-via-gateway
    istio-agent:
      modelConfigRef: claude-via-gateway
    cilium-debug-agent:
      modelConfigRef: claude-via-gateway
    cilium-manager-agent:
      modelConfigRef: claude-via-gateway
    cilium-policy-agent:
      modelConfigRef: claude-via-gateway
    kgateway-agent:
      modelConfigRef: claude-via-gateway
    observability-agent:
      modelConfigRef: claude-via-gateway
    promql-agent:
      modelConfigRef: claude-via-gateway
    argo-rollouts-conversion-agent:
      modelConfigRef: claude-via-gateway
