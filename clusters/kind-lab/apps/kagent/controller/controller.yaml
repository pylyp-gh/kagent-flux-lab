---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  # Workaround Helm OCI digest augmentation bug:
  # Helm 3.8+ sets .Chart.Version = "<semver>+<digest_prefix>" для OCI charts.
  # Chart templates render це у app.kubernetes.io/version label → invalid '+' char у K8s.
  # postRenderer overrides label на empty string (valid K8s value).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: '.*'
              labelSelector: 'app.kubernetes.io/version'
            patch: |
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: ""
  values:
    # --- Disable subcharts (per Chart.yaml dependencies conditions, top-level keys) ---
    kmcp:
      enabled: false
    kagent-tools:
      enabled: false
    grafana-mcp:
      enabled: false
    querydoc:
      enabled: false
    k8s-agent:
      enabled: false
    kgateway-agent:
      enabled: false
    istio-agent:
      enabled: false
    helm-agent:
      enabled: false
    observability-agent:
      enabled: false
    promql-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    argo-rollouts-agent:
      enabled: false

    # --- Main chart's own agent registry (separate scope) ---
    agents:
      argo-rollouts-agent: { enabled: false }
      cilium-debug-agent: { enabled: false }
      cilium-manager-agent: { enabled: false }
      cilium-policy-agent: { enabled: false }
      helm-agent: { enabled: false }
      istio-agent: { enabled: false }
      k8s-agent: { enabled: false }
      kgateway-agent: { enabled: false }
      observability-agent: { enabled: false }
      promql-agent: { enabled: false }
