---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    # Tag + digest pin. Refresh: `crane digest ghcr.io/kagent-dev/kagent/helm/kagent-crds:0.9.2`
    tag: "0.9.2"
    digest: sha256:0ce9f34bed3c035d9d9e67b62767edd3f1b632318f6e703795c3d8dcd2f4ea1d
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    # Tag + digest pin. Refresh: `crane digest ghcr.io/kagent-dev/kagent/helm/kagent:0.9.2`
    tag: "0.9.2"
    digest: sha256:d24b41216b4e4663dbadd778857cbb570d01155be568a7d4038f797faca10754
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
  # Workaround chart bug: Helm OCI digest suffix renders into label + image tag → invalid '+'.
  # postRenderer fixes labels (replace empty), images (Kustomize images: override).
  postRenderers:
    - kustomize:
        images:
          - name: cr.kagent.dev/kagent-dev/kagent/controller
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/ui
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/app
            newTag: "0.9.2"
        patches:
          - target:
              kind: '.*'
              labelSelector: 'app.kubernetes.io/version'
            patch: |
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: ""
          # Agent trust injection (SSL_CERT_FILE + lab-ca-bundle volume) moved
          # to a separate file apps/kagent/config/agent-trust-patches.yaml.
          # Reason: postRenderer on kagent HelmRelease renders the deployment field
          # into the manifest, but helm-controller SSA doesn't claim ownership of it →
          # kagent controller's next client-side Update drops the field.
          # Via a separate Flux Kustomization (kagent-config), kustomize-controller
          # claims ownership with its own field manager — conflict-free, persistent.

          # kagent-controller trust mount — controller validates each
          # RemoteMCPServer URL at registration (calls /mcp initialize, fetches
          # tool list). When the URL points at the gateway over HTTPS
          # (querydoc.ash.ph.lab), Go's default HTTPS client doesn't trust the
          # self-signed lab-ca → ACCEPTED: False, agents can't see the tool.
          # SSL_CERT_FILE → bundle includes Mozilla defaults + lab-ca (Bundle
          # source `useDefaultCAs: true`), so no loss of public trust roots.
          - target:
              kind: Deployment
              name: kagent-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kagent-controller
              spec:
                template:
                  spec:
                    containers:
                      - name: controller
                        env:
                          - name: SSL_CERT_FILE
                            value: /etc/ssl/lab-ca/ca.crt
                        volumeMounts:
                          - name: lab-ca-bundle
                            mountPath: /etc/ssl/lab-ca
                            readOnly: true
                    volumes:
                      - name: lab-ca-bundle
                        configMap:
                          name: lab-ca-bundle

          # querydoc Deployment trust mount — patches the subchart's rendered
          # Deployment directly (no kagent controller involvement → SSA conflict
          # does not apply). Mounts the trust-manager Bundle ConfigMap so the
          # MCP server's Node.js HTTPS client trusts the self-signed lab-ca
          # presented by agentgateway-proxy when calling Ollama embeddings.
          - target:
              kind: Deployment
              name: kagent-querydoc
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kagent-querydoc
              spec:
                template:
                  spec:
                    containers:
                      - name: querydoc
                        env:
                          - name: NODE_EXTRA_CA_CERTS
                            value: /etc/ssl/lab-ca/ca.crt
                        volumeMounts:
                          - name: lab-ca-bundle
                            mountPath: /etc/ssl/lab-ca
                            readOnly: true
                    volumes:
                      - name: lab-ca-bundle
                        configMap:
                          name: lab-ca-bundle
  values:
    # Global tag override — chart's template default falls back to this
    tag: "0.9.2"
    # Explicit overrides per known component (belt-and-suspenders)
    controller:
      image:
        tag: "0.9.2"
      agentImage:
        tag: "0.9.2"
    # Override modelConfig for all chart-managed agents — routes via
    # agentgateway (claude-via-gateway → Anthropic Claude). Default was
    # default-model-config (real OpenAI, stub key fails), which is useless.
    # Now each of the 10 default agents has a working backend via gateway.
    k8s-agent:
      modelConfigRef: claude-via-gateway
    helm-agent:
      modelConfigRef: claude-via-gateway
    istio-agent:
      modelConfigRef: claude-via-gateway
    cilium-debug-agent:
      modelConfigRef: claude-via-gateway
    cilium-manager-agent:
      modelConfigRef: claude-via-gateway
    cilium-policy-agent:
      modelConfigRef: claude-via-gateway
    kgateway-agent:
      modelConfigRef: claude-via-gateway
    observability-agent:
      modelConfigRef: claude-via-gateway
    promql-agent:
      modelConfigRef: claude-via-gateway
    argo-rollouts-conversion-agent:
      modelConfigRef: claude-via-gateway

    # querydoc subchart — exposes `queryDocumentation` MCP tool that queries
    # the in-cluster Qdrant collection seeded by the doc2vec writer (Phase C).
    # Lives inside the kagent OCI chart bundle; only enabled here.
    # Image override pulls our fork (kagent-dev/doc2vec#82) for OPENAI_BASE_URL
    # support — points the SDK at the agentgateway-proxy /ollama route.
    querydoc:
      enabled: true
      # Default fullname stays `kagent-querydoc` (subchart prepends release
      # name). External reach routes through agentgateway-proxy via HTTPRoute
      # `querydoc.ash.ph.lab` (see apps/agentgateway/routes/querydoc-mcp-route.yaml).
      # kagent Agents call MCP at that hostname, gateway terminates TLS and
      # forwards to backendRef `kagent-querydoc:8080`.
      image:
        registry: ghcr.io
        repository: pylyp-gh/doc2vec/mcp
        # Tag + digest pin (multi-arch index — linux/amd64, linux/arm64).
        # Refresh: `crane digest ghcr.io/pylyp-gh/doc2vec/mcp:feat-openai-base-url`
        # Rationale + upstream PR link: see FORKS.md at repo root.
        tag: feat-openai-base-url@sha256:a004e7e1cc358d86c46cd2ae3ddc15a9c3b9209f5a5387b8cda322b16e8c00e2
        pullPolicy: IfNotPresent
      service:
        type: ClusterIP
        port: 8080
      logLevel: info
      config:
        VECTOR_DB_TYPE: qdrant
        QDRANT_URL: http://qdrant.qdrant.svc.cluster.local:6333
        EMBEDDING_PROVIDER: openai
        OPENAI_MODEL: nomic-embed-text
        # baseURL hits agentgateway's /ollama-embed route — distinct from
        # /ollama chat route because AgentgatewayBackend ai-mode validates
        # chat payloads (`messages: [...]`) and rejects embedding payloads
        # (`input: ...`). The /ollama-embed route uses a `static` backend
        # (plain TCP forward, no chat semantics) → embeddings pass through.
        # URLRewrite strips /ollama-embed and prepends /v1 → Ollama's
        # /v1/embeddings (OpenAI-compatible).
        OPENAI_BASE_URL: https://agentgateway-proxy.agentgateway-system.svc.cluster.local/ollama-embed
      openai:
        # Ollama doesn't validate the key but OpenAI SDK requires non-empty.
        apiKey: ollama
