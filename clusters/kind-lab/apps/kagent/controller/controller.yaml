---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.9.2"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  dependsOn:
    - name: kagent-crds
  interval: 5m
  releaseName: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  install:
    remediation:
      retries: 3
  # Workaround chart bug: Helm OCI digest суфікс рендериться у label + image tag → invalid '+'.
  # postRenderer fixes labels (replace empty), images (Kustomize images: override).
  postRenderers:
    - kustomize:
        images:
          - name: cr.kagent.dev/kagent-dev/kagent/controller
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/ui
            newTag: "0.9.2"
          - name: cr.kagent.dev/kagent-dev/kagent/app
            newTag: "0.9.2"
        patches:
          - target:
              kind: '.*'
              labelSelector: 'app.kubernetes.io/version'
            patch: |
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: ""
          # Inject lab-ca trust у всі Agent pods — Python OpenAI SDK (httpx)
          # читає SSL_CERT_FILE env. lab-ca-bundle ConfigMap створюється
          # trust-manager автоматично у kagent ns (включає system CAs + lab-ca).
          # Без цього — kagent pods → HTTPS до agentgateway → cert verify fail.
          - target:
              group: kagent.dev
              version: v1alpha2
              kind: Agent
            patch: |
              apiVersion: kagent.dev/v1alpha2
              kind: Agent
              metadata:
                name: not-important
              spec:
                declarative:
                  deployment:
                    env:
                      - name: SSL_CERT_FILE
                        value: /etc/ssl/lab/ca.crt
                    volumeMounts:
                      - name: lab-ca-bundle
                        mountPath: /etc/ssl/lab
                        readOnly: true
                    volumes:
                      - name: lab-ca-bundle
                        configMap:
                          name: lab-ca-bundle
                          items:
                            - key: ca.crt
                              path: ca.crt
  values:
    # Global tag override — chart's template default falls back to це
    tag: "0.9.2"
    # Explicit overrides per known component (belt-and-suspenders)
    controller:
      image:
        tag: "0.9.2"
      agentImage:
        tag: "0.9.2"
