  namespace: kagent
  labels:
    lab.cert-trust: enabled
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: observability-agent
  namespace: kagent
  labels:
    lab.cert-trust: enabled
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
