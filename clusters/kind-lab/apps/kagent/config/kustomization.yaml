apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # openai-stub.yaml moved to ../stubs/ — applied EARLY (kagent-stubs Flux
  # Kustomization). Reason: Helm install kagent-controller spawns Agent
  # CRDs → pods that need the Secret. If Secret applied here (after
  # controller) — deadlock on bootstrap.
  - model-config.yaml
  - qwen-model-config.yaml
  - agent-trust-stubs.yaml
  - test-agents.yaml
  - doc-agent.yaml
  - querydoc-mcp.yaml

# Apply lab CA trust patch to every Agent labelled lab.cert-trust=enabled
# (the chart-managed agents listed in agent-trust-stubs.yaml). Single source
# of truth for the env+volume block — change ca.crt path in one place.
patches:
  - path: agent-trust-patch.yaml
    target:
      kind: Agent
      labelSelector: lab.cert-trust=enabled
