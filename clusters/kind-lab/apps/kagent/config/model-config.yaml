---
# Kagent ModelConfig — OpenAI-compatible adapter через agentgateway.
#
# Архітектура:
#   kagent's OpenAI Go SDK sends standard OpenAI format request →
#   agentgateway receives на /v1/chat/completions →
#   AgentgatewayBackend (provider=anthropic) translates до Anthropic API format →
#   forwards до api.anthropic.com з x-api-key (gateway-side) →
#   Anthropic responds → gateway translates назад → kagent agent receives.
#
# Чому НЕ provider=Anthropic: kagent's Go ADK Anthropic SDK sends body schema
# що agentgateway 1.1.0 не може parse ("missing field type"). OpenAI-compat path
# uses different (newer) parsing logic у gateway → working.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: claude-via-gateway
  namespace: kagent
spec:
  # OpenAI-compatible adapter, gateway re-routes to Anthropic backend
  provider: OpenAI
  # Model name passed by SDK у request body. AgentgatewayBackend defines real
  # upstream model (claude-opus-4-6). Цей field нерелевантний для routing.
  model: gpt-4o-mini
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    # OpenAI SDK appends /v1/chat/completions автоматом → matches HTTPRoute path
    baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local"
