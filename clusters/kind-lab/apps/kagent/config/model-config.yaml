---
# kagent ModelConfig that routes via agentgateway with an OpenAI-format payload;
# the gateway itself translates to the Anthropic native API.
#
# 🔧 TODO: track upstream fix in agentgateway for the Anthropic tool_choice deserializer.
#    The current implementation is an **intentional workaround**. If upstream releases
#    a fix with a corrected Rust deserializer (natively accepting the Anthropic
#    {"type": "auto"} shape), switch the provider back to Anthropic for
#    explicit semantics. Check on every agentgateway upgrade — search
#    issues with keywords "ChatCompletionToolChoiceOption" or
#    "tool_choice" at https://github.com/agentgateway/agentgateway/issues
#
# Why provider: OpenAI instead of Anthropic:
#   agentgateway internally parses the body as an OpenAI ChatCompletion schema
#   (specifically tool_choice — Rust untagged enum ChatCompletionToolChoiceOption).
#   Anthropic SDK via kagent ADK sends tool_choice as {"type":"auto"|"any"|"tool"},
#   which does NOT match OpenAI variants ("auto"|"none"|"required"|{"type":"function",...})
#   → serialiser throws 503. With provider: OpenAI, ADK generates an OpenAI body natively
#   → parser is satisfied → gateway translates to Anthropic /v1/messages.
#
# Auth flow:
#   - kagent ADK init requires OPENAI_API_KEY env var (from stub Secret kagent-openai)
#   - Real Anthropic key is injected gateway-side
#     (AgentgatewayBackend anthropic-completions → policies.auth.secretRef → x-api-key)
#   - kagent itself stores nothing real
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: claude-via-gateway
  namespace: kagent
spec:
  provider: OpenAI
  # Model name passes through gateway translation to the backend → Anthropic API.
  # AgentgatewayBackend anthropic-completions hardcodes claude-opus-4-6,
  # so this field is mostly for the kagent UI/logs.
  model: claude-opus-4-6
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    # SDK appends /v1/chat/completions → final URL:
    #   https://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1/chat/completions
    # → matches HTTPRoute anthropic-completions (PathPrefix /v1/chat/completions)
    # → backend anthropic-completions (provider.anthropic, claude-opus-4-6)
    # → gateway translates OpenAI body → Anthropic native
    # → upstream api.anthropic.com/v1/messages
    #
    # HTTPS because the HTTP listener on the gateway has been removed (secure entrypoint only).
    # Trust: lab-ca-bundle ConfigMap mounted in pod via postRenderer patch in kagent
    # HelmRelease, SSL_CERT_FILE env var pointing to /etc/ssl/lab/ca.crt.
    # Cert SAN includes agentgateway-proxy.agentgateway-system.svc.cluster.local.
    baseUrl: "https://agentgateway-proxy.agentgateway-system.svc.cluster.local"
