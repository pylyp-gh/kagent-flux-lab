---
# Kagent ModelConfig що pointить через agentgateway замість Anthropic API напряму.
# Auth handled gateway-side (AgentgatewayBackend.policies.auth.secretRef → x-api-key injection).
# kagent itself зберігає zero credentials — pure separation of concerns.
#
# Якщо kagent's controller validates apiKeySecret at runtime — fallback options:
#   1. spec.apiKeyPassthrough: true (forward incoming A2A Bearer token)
#   2. Add dummy placeholder Secret + apiKeySecret reference (gateway overrides anyway)
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: claude-via-gateway
  namespace: kagent
spec:
  provider: Anthropic
  model: claude-opus-4-6
  anthropic:
    # baseUrl з '/anthropic' prefix щоб HTTPRoute path match'нувся.
    # Anthropic SDK appends /v1/messages → final: <baseUrl>/v1/messages
    # → http://...service/anthropic/v1/messages → matches HTTPRoute PathPrefix /anthropic
    baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/anthropic"
