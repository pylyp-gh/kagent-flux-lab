---
# kagent ModelConfig що ходить через agentgateway з OpenAI-format payload,
# а gateway сам транслює до Anthropic native API.
#
# Чому provider: OpenAI а не Anthropic:
#   agentgateway внутрішньо парсить body як OpenAI ChatCompletion схему
#   (зокрема tool_choice — Rust untagged enum ChatCompletionToolChoiceOption).
#   Anthropic SDK з kagent ADK шле tool_choice у формі {"type":"auto"|"any"|"tool"},
#   що НЕ matches OpenAI варіанти ("auto"|"none"|"required"|{"type":"function",...})
#   → серіалізатор кидає 503. З provider: OpenAI ADK генерує OpenAI body натівно
#   → парсер задоволений → gateway translate'ить до Anthropic /v1/messages.
#
# Auth flow:
#   - kagent ADK init вимагає OPENAI_API_KEY env var (зі stub Secret kagent-openai)
#   - Реальний Anthropic ключ інжектиться gateway-side
#     (AgentgatewayBackend anthropic-completions → policies.auth.secretRef → x-api-key)
#   - kagent сам нічого справжнього не зберігає
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: claude-via-gateway
  namespace: kagent
spec:
  provider: OpenAI
  # Модель ім'я переходить через gateway translation у backend → Anthropic API.
  # AgentgatewayBackend anthropic-completions hardcode'ить claude-opus-4-6,
  # тому field тут переважно для UI/логів kagent.
  model: claude-opus-4-6
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    # SDK appends /v1/chat/completions → final URL:
    #   https://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1/chat/completions
    # → matches HTTPRoute anthropic-completions (PathPrefix /v1/chat/completions)
    # → backend anthropic-completions (provider.anthropic, claude-opus-4-6)
    # → gateway translates OpenAI body → Anthropic native
    # → upstream api.anthropic.com/v1/messages
    #
    # HTTPS бо HTTP listener на gateway видалено (тільки secure entrypoint).
    # Trust: lab-ca-bundle ConfigMap mounted у pod через postRenderer patch у kagent
    # HelmRelease, SSL_CERT_FILE env vary точкою на /etc/ssl/lab/ca.crt.
    # Cert SAN включає agentgateway-proxy.agentgateway-system.svc.cluster.local.
    baseUrl: "https://agentgateway-proxy.agentgateway-system.svc.cluster.local"
