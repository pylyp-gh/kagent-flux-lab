---
# Trust injection for chart-managed Agent CRDs (HTTPS to agentgateway).
#
# Why a separate yaml rather than a HelmRelease postRenderer:
#   Helm-controller's Server-Side Apply on generated Agent CRDs does **not** claim
#   ownership of spec.declarative.deployment.* fields (even though postRenderer renders them
#   into the manifest). So on the kagent controller's next client-side Update, the PUT
#   operation drops the deployment field.
#
# This file is deployed via the kagent-config Flux Kustomization, which runs AFTER
# the kagent-controller HelmRelease. kustomize-controller SSA with its own field manager
# claims deployment.env/volumes/volumeMounts → kagent controller can't drop them.
#
# Agents that actually need trust (hitting https://agentgateway-proxy/.../...):
#   - cilium-debug-agent, k8s-agent (claude-via-gateway → real Anthropic)
# The rest — patch applied preemptively (no harm), in case they're switched to that ModelConfig later.

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-agent
  namespace: kagent
spec:
  declarative:
    deployment:
      env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/lab/ca.crt
      volumeMounts:
        - name: lab-ca-bundle
          mountPath: /etc/ssl/lab
          readOnly: true
      volumes:
        - name: lab-ca-bundle
          configMap:
            name: lab-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt

