---
# GitOps-managed test agents — smoke-test both paths:
#   flux-anthropic-test → ModelConfig claude-via-gateway → gateway → Anthropic Claude
#   flux-ollama-test    → ModelConfig qwen-via-gateway → gateway → Mac Ollama qwen2.5:7b
#
# Existing live agents (blah, minimal2 etc.) — not touched.
# Via trust-bundle ConfigMap mounted in pods (via agent-trust-patches.yaml),
# HTTPS to gateway works with self-signed lab-ca.

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: flux-anthropic-test
  namespace: kagent
spec:
  type: Declarative
  description: GitOps-managed test agent for Anthropic Claude via agentgateway
  declarative:
    modelConfig: claude-via-gateway
    runtime: python
    systemMessage: |-
      You are a friendly Kubernetes-aware assistant deployed via Flux GitOps
      for end-to-end testing of the agentgateway → Anthropic Claude pipeline.

      # Instructions
      - Keep responses concise and direct
      - When asked to identify yourself, mention you're routed through agentgateway
        to Anthropic Claude
      - Format responses as Markdown
    tools: []
    # Trust lab-ca for HTTPS to agentgateway (gateway-only secure entrypoint).
    deployment:
      env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/lab/ca.crt
      volumeMounts:
        - name: lab-ca-bundle
          mountPath: /etc/ssl/lab
          readOnly: true
      volumes:
        - name: lab-ca-bundle
          configMap:
            name: lab-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: flux-ollama-test
  namespace: kagent
spec:
  type: Declarative
  description: GitOps-managed test agent for Ollama qwen2.5 via agentgateway
  declarative:
    modelConfig: qwen-via-gateway
    runtime: python
    systemMessage: |-
      You are a lightweight assistant powered by Ollama qwen2.5:7b running on
      a local Mac host, accessed via agentgateway in the kind-lab cluster.

      # Instructions
      - Keep responses concise — running on small local model
      - Format responses as Markdown
    tools: []
    # Trust lab-ca for HTTPS to agentgateway.
    deployment:
      env:
        - name: SSL_CERT_FILE
          value: /etc/ssl/lab/ca.crt
      volumeMounts:
        - name: lab-ca-bundle
          mountPath: /etc/ssl/lab
          readOnly: true
      volumes:
        - name: lab-ca-bundle
          configMap:
            name: lab-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt
