---
# ingest-orchestrator — A2A agent with full MCP client capabilities (Lab 4).
# Phase 1 ships HTTP server + Agent Card + echo skill. Subsequent phases
# add MCP client integration, Sampling bridge to Anthropic, and Elicitation
# bridge through A2A streaming.
#
# Not a kagent Agent CRD — this is an independent Go service. Lives in its
# own namespace for isolation; ServiceAccount minimal (no cluster access
# needed; only outbound HTTPS to agentgateway-proxy).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-orchestrator
  namespace: ingest-orchestrator
  labels:
    app.kubernetes.io/name: ingest-orchestrator
    app.kubernetes.io/component: a2a-agent
    app.kubernetes.io/part-of: kagent-flux-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest-orchestrator
    spec:
      containers:
        - name: orchestrator
          # Multi-arch (linux/amd64, linux/arm64) built by GitHub Actions on
          # push to main; pinned by commit SHA for GitOps immutability.
          # Phase 3 image: adds Sampling bridge — CreateMessageHandler that
          # translates MCP sampling/createMessage requests into OpenAI
          # ChatCompletion calls through the gateway. Client now advertises
          # sampling capability during the initialize handshake.
          image: ghcr.io/pylyp-gh/ingest-orchestrator:sha-3cde1a8
          imagePullPolicy: IfNotPresent
          args:
            - "--http"
            - ":8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: A2A_SERVICE_ENDPOINT
              value: "https://ingest.ash.ph.lab"
            # Claude (via agentgateway) — same path kagent agents use.
            # gateway parses OpenAI body, translates to Anthropic /v1/messages
            # using anthropic-secret server-side. Any non-empty placeholder
            # key satisfies the OpenAI SDK auth header; real key never leaves
            # the gateway's Secret store.
            - name: OPENAI_BASE_URL
              value: "https://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1/"
            - name: OPENAI_API_KEY
              value: "stub-gateway-injects-real-key"
            - name: MODEL_NAME
              value: "claude-opus-4-6"
            # MCP server target — doc-writer-mcp via gateway hostname so all
            # in-cluster MCP traffic flows through one ingress (matches the
            # RemoteMCPServer pattern used by kagent agents).
            - name: MCP_SERVER_URL
              value: "https://doc-writer.ash.ph.lab/mcp"
            # TLS trust for both endpoints above — distributed by
            # trust-manager Bundle "lab-ca-bundle" (see
            # infrastructure/configs/trust-bundle.yaml).
            - name: SSL_CERT_FILE
              value: /etc/ssl/lab/ca.crt
          volumeMounts:
            - name: lab-ca-bundle
              mountPath: /etc/ssl/lab
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: lab-ca-bundle
          configMap:
            name: lab-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-orchestrator
  namespace: ingest-orchestrator
  labels:
    app.kubernetes.io/name: ingest-orchestrator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ingest-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
