apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      containers:
        - name: agentgateway
          image: ghcr.io/agentgateway/agentgateway:latest
          ports:
            - containerPort: 8080  # LLM
            - containerPort: 8081  # MCP
            - containerPort: 8082  # A2A
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
      volumes:
        - name: config
          configMap:
            name: agentgateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  selector:
    app: agentgateway
  ports:
    - name: llm
      port: 8080
    - name: mcp
      port: 8081
    - name: a2a
      port: 8082
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
data:
  config.yaml: |
    listeners:
      - name: llm
        address: 0.0.0.0
        port: 8080
        protocol: HTTP
      - name: mcp
        address: 0.0.0.0
        port: 8081
        protocol: MCP
      - name: a2a
        address: 0.0.0.0
        port: 8082
        protocol: A2A
    llm:
      providers:
        - name: openai
          type: openai
          api_key_secret: openai-credentials
    security:
      authentication:
        type: kubernetes
        service_account_validation: true


---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gateway-model-config
  namespace: kagent
spec:
  provider: Anthropic
  model: claude-opus-4-6
  apiKeySecretRef:
    name: kagent-anthropic
    key: ANTHROPIC_API_KEY
  baseUrl: http://agentgateway.agentgateway-system.svc:8080/v1
---

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: code-assistant
  namespace: kagent
spec:
  description: A code review and documentation assistant
  type: Declarative
  declarative:
    modelConfig: gateway-model-config
    systemMessage: |-
      You are an expert code reviewer and documentation writer.
      Help users with code review, documentation, and best practices.
    tools:
      - type: McpServer
        mcpServer:
          name: filesystem-server
          kind: RemoteMCPServer
          toolNames:
            - read_file
            - write_file
      - type: McpServer
        mcpServer:
          name: github-server
          kind: RemoteMCPServer
          toolNames:
            - get_pull_request
            - create_review
