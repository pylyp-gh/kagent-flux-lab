---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 5m
  url: oci://cr.agentgateway.dev/charts/agentgateway-crds
  ref:
    tag: v2.2.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 5m
  releaseName: agentgateway-crds
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  interval: 5m
  url: oci://cr.agentgateway.dev/charts/agentgateway
  ref:
    tag: v2.2.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  dependsOn:
    - name: agentgateway-crds
  interval: 5m
  releaseName: agentgateway
  chartRef:
    kind: OCIRepository
    name: agentgateway
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controller:
      image:
        pullPolicy: IfNotPresent
