---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 5m
  url: oci://cr.agentgateway.dev/charts/agentgateway-crds
  ref:
    # 🔒 TODO (supply chain): pin до digest для prod. OCI tags mutable —
    # registry rewrite (intentional чи compromised) подтягне інший image.
    # Команда: crane digest oci://cr.agentgateway.dev/charts/agentgateway:v2.2.1
    # Тоді: digest: sha256:... (tag можна тримати як reference)
    tag: v2.2.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 1m
  releaseName: agentgateway-crds
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  interval: 1m
  url: oci://cr.agentgateway.dev/charts/agentgateway
  ref:
    # 🔒 TODO (supply chain): pin до digest для prod. OCI tags mutable —
    # registry rewrite (intentional чи compromised) подтягне інший image.
    # Команда: crane digest oci://cr.agentgateway.dev/charts/agentgateway:v2.2.1
    # Тоді: digest: sha256:... (tag можна тримати як reference)
    tag: v2.2.1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  dependsOn:
    - name: agentgateway-crds
  interval: 1m
  releaseName: agentgateway
  chartRef:
    kind: OCIRepository
    name: agentgateway
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controller:
      image:
        # IfNotPresent замість Always — у поєднанні з tag-pinned reference дає
        # stable image source. Always варто тільки коли treat tag як rolling
        # ("latest", "main") — небезпечно без digest pinning.
        pullPolicy: IfNotPresent
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"