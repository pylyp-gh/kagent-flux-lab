---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 5m
  url: oci://cr.agentgateway.dev/charts/agentgateway-crds
  ref:
    # Tag + digest. Tag для зручності читання, digest — immutable identity.
    # Refresh: `crane digest cr.agentgateway.dev/charts/agentgateway-crds:v2.2.1`
    tag: v2.2.1
    digest: sha256:a82eae1e4346aa4165edb380ef72551898e92a4c55182780c332c06d534054c8
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  interval: 1m
  releaseName: agentgateway-crds
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  interval: 1m
  url: oci://cr.agentgateway.dev/charts/agentgateway
  ref:
    # Tag + digest pin. Refresh: `crane digest cr.agentgateway.dev/charts/agentgateway:v2.2.1`
    tag: v2.2.1
    digest: sha256:f7497fcb08f73fdad9f60fb54a9623aa8e3a53a485ed78269f8cc80d38eaab94
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  dependsOn:
    - name: agentgateway-crds
  interval: 1m
  releaseName: agentgateway
  chartRef:
    kind: OCIRepository
    name: agentgateway
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controller:
      image:
        # IfNotPresent замість Always — у поєднанні з tag-pinned reference дає
        # stable image source. Always варто тільки коли treat tag як rolling
        # ("latest", "main") — небезпечно без digest pinning.
        pullPolicy: IfNotPresent
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"