---
# Експозиція kagent UI через спільний agentgateway-proxy HTTPS listener.
# Hostname-based routing — той самий MetalLB LB IP (192.168.97.200),
# різний SNI/Host → різний backend.
#
# Доступ: DNS на router → kagent.ash.ph.lab → 192.168.97.200.
# Тоді: https://kagent.ash.ph.lab (browser спершу попередить про
# self-signed CA — accept once; trust постійно через lab-ca cert у Keychain).
#
# kagent-ui Service — звичайний K8s Service (kind=Service default).
# agentgateway controller поважає стандартні Gateway API backendRef'и,
# не тільки власні AgentgatewayBackend CRD.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-ui
  namespace: kagent
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - kagent.ash.ph.lab
  rules:
    - backendRefs:
        - name: kagent-ui
          port: 8080
