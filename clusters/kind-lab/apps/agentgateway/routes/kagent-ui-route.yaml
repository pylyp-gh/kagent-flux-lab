---
# Експозиція kagent UI через існуючий agentgateway-proxy listener.
# Hostname-based routing — той самий LoadBalancer IP (192.168.97.200),
# різний Host header → різний backend.
#
# Доступ: додати у /etc/hosts на хості:
#   192.168.97.200 kagent.ash.ph.lab
# Тоді: http://kagent.ash.ph.lab
#
# kagent-ui Service — звичайний K8s Service (kind=Service default).
# agentgateway controller поважає стандартні Gateway API backendRef'и,
# не тільки власні AgentgatewayBackend CRD.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-ui
  namespace: kagent
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - kagent.ash.ph.lab
  rules:
    - backendRefs:
        - name: kagent-ui
          port: 8080
