---
# Експозиція kagent UI через існуючий agentgateway-proxy listener.
# Hostname-based routing — той самий LoadBalancer IP (192.168.97.200),
# різний Host header → різний backend.
#
# Доступ: додати у /etc/hosts на хості:
#   192.168.97.200 kagent.lab.local
# Тоді: http://kagent.lab.local
#
# kagent-ui Service — звичайний K8s Service (kind=Service default).
# agentgateway controller поважає стандартні Gateway API backendRef'и,
# не тільки власні AgentgatewayBackend CRD.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-ui
  namespace: kagent
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  # Multi-hostname для multi-env: kagent.lab.local (prod, MetalLB .200)
  # + kagent2.lab.local (test cluster, MetalLB .180). DNS router точкою
  # на відповідний IP. Wildcard cert *.lab.local матиме обидва SAN'ах.
  hostnames:
    - kagent.lab.local
    - kagent2.lab.local
  rules:
    - backendRefs:
        - name: kagent-ui
          port: 8080
