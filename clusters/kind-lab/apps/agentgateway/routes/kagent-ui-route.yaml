---
# Expose the kagent UI via the shared agentgateway-proxy HTTPS listener.
# Hostname-based routing — same MetalLB LB IP (192.168.97.200),
# different SNI/Host → different backend.
#
# Access: DNS on router → kagent.ash.ph.lab → 192.168.97.200.
# Then: https://kagent.ash.ph.lab (browser will warn about
# self-signed CA on first visit — accept once; trust permanently via lab-ca cert in Keychain).
#
# kagent-ui Service — standard K8s Service (kind=Service default).
# agentgateway controller respects standard Gateway API backendRefs,
# not only its own AgentgatewayBackend CRDs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-ui
  namespace: kagent
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - kagent.ash.ph.lab
  rules:
    - backendRefs:
        - name: kagent-ui
          port: 8080
