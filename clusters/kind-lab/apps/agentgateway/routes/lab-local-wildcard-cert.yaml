---
# Wildcard certificate для всіх *.lab.local hostname.
# Один Secret обслуговує kagent UI, agentgateway admin UI, і будь-які майбутні sub-domains.
# Підписується lab-ca ClusterIssuer (self-signed root, infrastructure/configs).
#
# Гateway listener https використовує цей cert + hostname "*.lab.local" — SNI matches усі sub-domains.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-local-wildcard
  namespace: agentgateway-system
spec:
  secretName: lab-local-wildcard-tls
  duration: 2160h0m0s # 90 days
  renewBefore: 360h0m0s # 15 days
  dnsNames:
    - "*.lab.local"
    - "lab.local"
    # In-cluster Service DNS — для kagent agent pods що ходять напряму
    # до Service (без external DNS hop через router).
    - "agentgateway-proxy.agentgateway-system.svc.cluster.local"
    - "agentgateway-proxy.agentgateway-system.svc"
    - "agentgateway-proxy.agentgateway-system"
    - "agentgateway-proxy"
  issuerRef:
    name: lab-ca
    kind: ClusterIssuer
    group: cert-manager.io
