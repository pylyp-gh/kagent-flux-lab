---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener для secure context (потрібен для crypto.randomUUID() у kagent UI).
    # TLS terminate на gateway — клієнт ↔ gateway по TLS, gateway ↔ pod plain HTTP.
    # Certificate kagent-lab-local-tls видає cert-manager (lab-ca ClusterIssuer).
    - name: https
      protocol: HTTPS
      port: 443
      hostname: kagent.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: kagent-lab-local-tls
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy-http
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All
