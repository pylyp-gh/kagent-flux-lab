---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy
  listeners:
    # HTTPS-only — single secure entrypoint. HTTP listener removed.
    # No hostname specified → listener accepts any SNI; cert ash-ph-lab-wildcard-tls
    # covers *.ash.ph.lab + in-cluster Service DNS (via extended dnsNames).
    # In-cluster kagent agent pods trust lab-ca via trust-manager Bundle.
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ash-ph-lab-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
