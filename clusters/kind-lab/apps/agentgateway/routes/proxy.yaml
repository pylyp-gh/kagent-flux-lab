---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy
  listeners:
    # HTTPS-only — єдиний secure entrypoint. HTTP listener видалено.
    # Hostname не вказано → listener accepts будь-який SNI; cert ash-ph-lab-wildcard-tls
    # покриває *.ash.ph.lab + in-cluster Service DNS (через extended dnsNames).
    # In-cluster kagent agent pods trust lab-ca через trust-manager Bundle.
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ash-ph-lab-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
