---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener з wildcard hostname — SNI-based routing на *.lab.local.
    # Один cert обслуговує kagent.lab.local, agentgateway.lab.local тощо.
    # TLS terminate на gateway — клієнт ↔ gateway по TLS, gateway ↔ pod plain HTTP.
    # Certificate lab-local-wildcard-tls видає cert-manager (lab-ca ClusterIssuer).
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.lab.local"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: lab-local-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy-http
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
  - protocol: HTTP
    port: 80
    name: http
    allowedRoutes:
      namespaces:
        from: All
