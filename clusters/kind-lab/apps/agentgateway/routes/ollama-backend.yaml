# Ollama backend — local Ollama on Mac host via docker bridge gateway.
#
# Architecture:
#   pod inside cluster
#     → Service "ollama" (headless, ClusterIP=None)
#     → EndpointSlice → 10.222.222.222:11434 (Mac host via OrbStack docker bridge)
#     → Ollama listening 0.0.0.0:11434 (exposed via Ollama.app Settings or LaunchAgent)
#
# Why headless Service + EndpointSlice: external IP can't be a ClusterIP target,
# K8s doesn't allow selectors on external addresses. Headless Service + manual EndpointSlice
# = "external service abstraction" pattern.
#
# AgentgatewayBackend with provider=openai because Ollama exposes /v1/chat/completions —
# OpenAI-compatible API.
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agentgateway-system
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama
  namespace: agentgateway-system
  labels:
    kubernetes.io/service-name: ollama
addressType: IPv4
endpoints:
  - addresses:
      - 10.222.222.222     # OrbStack docker bridge gateway = Mac host
ports:
  - port: 11434
    protocol: TCP
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ollama
  namespace: agentgateway-system
spec:
  ai:
    provider:
      openai:
        model: "qwen2.5:7b"
      host: ollama.agentgateway-system.svc.cluster.local
      port: 11434
---
# Static (plain TCP/HTTP forward) backend for Ollama embeddings path.
# AgentgatewayBackend with `spec.ai.provider.openai` is chat-mode — it
# expects `messages: [...]` payloads, validates them as chat completions,
# and rejects `input: ...` embedding payloads with 503 "missing field
# messages". `spec.static` skips the chat semantics entirely: pure TCP
# proxy to host:port. Embeddings pass through verbatim to Ollama's
# OpenAI-compatible /v1/embeddings.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ollama-embed
  namespace: agentgateway-system
spec:
  static:
    host: ollama.agentgateway-system.svc.cluster.local
    port: 11434
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    # Embeddings path — routed via static backend (no chat-logic interference).
    # Place BEFORE /ollama rule so longer-prefix /ollama-embed matches first.
    - matches:
        - path:
            type: PathPrefix
            value: /ollama-embed
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1
      backendRefs:
        - name: ollama-embed
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
    # Chat completions path — through ai-provider backend that adds OpenAI
    # chat semantics (token tracking, model translation, etc.).
    - matches:
        - path:
            type: PathPrefix
            value: /ollama
      # Strip '/ollama' prefix before forwarding upstream:
      # /ollama/chat/completions → /v1/chat/completions (Ollama OpenAI endpoint)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1
      backendRefs:
        - name: ollama
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
