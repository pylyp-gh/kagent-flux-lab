---
# Два майже ідентичних Anthropic backends:
#   - anthropic               — catch-all HTTPRoute "/" (будь-який path → translation до Anthropic)
#   - anthropic-completions   — specifically PathPrefix /v1/chat/completions
# Обидва provider.anthropic з claude-opus-4-6 та anthropic-secret для auth.
# TODO (Reviewer NTH3): consolidate в один backend + HTTPRoute з multiple matches —
# зараз duplicate config для readability двох path-style варіантів.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: "claude-opus-4-6"
  policies:
    auth:
      secretRef:
        name: anthropic-secret

---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic-completions
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: "claude-opus-4-6"
  policies:
    auth:
      secretRef:
        name: anthropic-secret
        
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  - backendRefs:
    - name: anthropic
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic-completions
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    backendRefs:
    - name: anthropic-completions
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend
