---
# AgentgatewayBackend з canonical v2.2.1 schema (groups[].providers[]) +
# explicit promptCaching щоб enable tool-aware request handling.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  ai:
    groups:
      - providers:
          # name: "*" — wildcard model match (per standalone docs `name: "*"` example)
          # Matches any "model" value from incoming request body → routes to this provider.
          - name: "*"
            anthropic:
              model: "claude-opus-4-6"
            policies:
              auth:
                secretRef:
                  name: anthropic-secret
              ai:
                promptCaching:
                  cacheTools: true
                  cacheMessages: false
                  cacheSystem: false
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anthropic
        - path:
            type: PathPrefix
            value: /v1/chat/completions
        - path:
            type: PathPrefix
            value: /v1/messages
      backendRefs:
        - name: anthropic
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
