# AgentgatewayParameters: кастомізація proxy deployment + service через overlays.
#
# Ціль: експонувати admin UI (binds 127.0.0.1:15000 всередині pod) назовні через MetalLB.
# Стратегія: socat sidecar listens на 0.0.0.0:15010 → forwards до 127.0.0.1:15000.
# Service overlay додає port 15010, MetalLB IP serves обидва 443 (HTTPS) і 15010 (admin).
#
# ⚠️  SECURITY: admin UI exposes live xDS dump, route config, secret refs. На prod
# додавай NetworkPolicy + auth proxy (oauth2-proxy). Lab — open.
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  # Debug logging — лоgає full request bodies, struct parse errors, internal trace.
  # Cost: галасливі логи (~10x volume). Lab-acceptable, prod зменшити після diagnosis.
  logging:
    level: debug
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: socat-admin
              # Tag + digest pin — tag для зручності читання у logs/UI,
              # digest — immutable identity. Registry rewrite tag → digest
              # mismatch → kubelet pull fail (intentional safety).
              image: alpine/socat:1.8.0.0@sha256:a6be4c0262b339c53ddad723cdd178a1a13271e1137c65e27f90a08c16de02b8
              args:
                - tcp-listen:15010,reuseaddr,fork
                - tcp:127.0.0.1:15000
              ports:
                - containerPort: 15010
                  name: admin
                  protocol: TCP
              resources:
                limits:
                  cpu: 50m
                  memory: 32Mi
                requests:
                  cpu: 10m
                  memory: 8Mi
  service:
    spec:
      ports:
        - name: admin
          port: 15010
          targetPort: 15010
          protocol: TCP
