---
# HTTPRoute exposing the mcp-governance dashboard UI via HTTPS through
# the shared agentgateway-proxy Gateway. Hostname `mcpg.ash.ph.lab`
# resolves via the wildcard *.ash.ph.lab DNS entry to the MetalLB IP
# 192.168.97.200. Wildcard cert covers SNI; agentgateway terminates TLS
# at port 443 and forwards plain HTTP to the dashboard Service:3000.
#
# Dashboard is a Next.js app that uses CONTROLLER_API_URL (set in the
# Helm values) for server-side proxying — browser doesn't see the
# controller directly, only the dashboard. Hence one HTTPRoute is enough.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-governance-dashboard
  namespace: mcp-governance
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - mcpg.ash.ph.lab
  rules:
    - backendRefs:
        - name: mcp-governance-dashboard
          port: 3000
