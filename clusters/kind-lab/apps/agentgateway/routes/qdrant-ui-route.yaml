---
# HTTPRoute that exposes the Qdrant REST API + Dashboard via HTTPS through
# the shared agentgateway-proxy. Hostname `qdrant.ash.ph.lab` resolves to
# the MetalLB IP 192.168.97.200 via the wildcard router DNS entry.
# Wildcard cert *.ash.ph.lab covers the SNI; agentgateway terminates TLS
# at port 443 and forwards plain HTTP to the Qdrant Service:6333.
# Dashboard UI lives at the root path; REST API at /collections, /points, etc.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qdrant
  namespace: qdrant
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - qdrant.ash.ph.lab
  rules:
    - backendRefs:
        - name: qdrant
          port: 6333
