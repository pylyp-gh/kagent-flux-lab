---
# HTTPRoute для agentgateway admin UI через HTTPS на тому самому Gateway.
# Hostname agentgateway.lab.local → Service agentgateway-proxy:15010 (admin port).
# Admin endpoint обслуговується socat sidecar (port 15010 → 15000 на localhost).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-ui
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  # Multi-hostname: підтримує як prod-style (agentgateway.lab.local) так і
  # test cluster дubль (agentgateway2.lab.local). На DNS router різні
  # hostnames точкою на різні MetalLB IPs (.200 для prod, .180 для test).
  hostnames:
    - agentgateway.lab.local
    - agentgateway2.lab.local
  rules:
    - backendRefs:
        - name: agentgateway-proxy
          port: 15010
