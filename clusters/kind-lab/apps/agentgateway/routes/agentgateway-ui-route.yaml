---
# HTTPRoute for the agentgateway admin UI via HTTPS on the shared Gateway.
# Hostname agentgateway.ash.ph.lab → Service agentgateway-proxy:15010 (admin port).
# Admin endpoint served by the socat sidecar (port 15010 → 15000 on localhost in pod).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-ui
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  # Multi-hostname: supports both prod-style (agentgateway.ash.ph.lab) and
  # test cluster duplicate (agentgateway2.ash.ph.lab). DNS on router points
  # different hostnames to different MetalLB IPs (.200 for prod, .180 for test).
  hostnames:
    - agentgateway.ash.ph.lab
    - agentgateway2.ash.ph.lab
  rules:
    - backendRefs:
        - name: agentgateway-proxy
          port: 15010
