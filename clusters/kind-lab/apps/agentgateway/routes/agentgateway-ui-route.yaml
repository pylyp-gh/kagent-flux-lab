---
# HTTPRoute для agentgateway admin UI через HTTPS на спільному Gateway.
# Hostname agentgateway.ash.ph.lab → Service agentgateway-proxy:15010 (адмін порт).
# Admin endpoint обслуговується socat sidecar (port 15010 → 15000 на localhost у pod).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-ui
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  hostnames:
    - agentgateway.ash.ph.lab
  rules:
    - backendRefs:
        - name: agentgateway-proxy
          port: 15010
