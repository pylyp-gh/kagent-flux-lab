---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: doc-writer-mcp
  namespace: doc-writer
  annotations:
    kmcp.dev/description: Documentation writer MCP — Qdrant ingest with Elicitation + Sampling
    kmcp.dev/project-name: doc-writer-mcp
  labels:
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/instance: doc-writer-mcp
    app.kubernetes.io/managed-by: kmcp
    app.kubernetes.io/name: doc-writer-mcp
    app.kubernetes.io/part-of: kmcp
    kmcp.dev/framework: mcp-go
    kmcp.dev/version: 0.1.0
spec:
  deployment:
    cmd: ./server
    # args required: KMCP controller sets Pod command=[cmd] which overrides
    # both the Dockerfile ENTRYPOINT and CMD. Without --http the binary
    # defaults to stdio mode → reads EOF from absent stdin → exit 0 →
    # CrashLoopBackOff. Explicit args here are the only way to keep HTTP.
    args:
      - "--http"
      - ":8080"
    # Multi-arch image (linux/amd64, linux/arm64) built by GitHub Actions on
    # push to main; pinned by commit SHA for GitOps immutability. Public
    # GHCR — no imagePullSecret needed. See .github/workflows/build-push.yaml
    # in pylyp-gh/doc-writer-mcp.
    image: ghcr.io/pylyp-gh/doc-writer-mcp:sha-1778842
    port: 8080
  httpTransport:
    path: /mcp
    targetPort: 8080
  transportType: http
