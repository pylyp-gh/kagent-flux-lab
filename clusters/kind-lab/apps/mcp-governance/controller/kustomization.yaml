apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CRDs first — applied before the HelmRelease so MCPGovernancePolicy CR
  # (also in this Kustomization) can validate against the schema.
  - crd-mcpgovernancepolicy.yaml
  - crd-governanceevaluation.yaml
  # agentregistry.dev CRDs (SkillCatalog, MCPServerCatalog) now come з
  # the real agentregistry-inventory project — see
  # apps/agentregistry-inventory/ in this repo. mcp-governance-controller
  # Kustomization depends on it so CRDs exist when MCPG starts watching.
  # Source + release.
  - helmrepository.yaml
  - helmrelease.yaml
  # Cluster-level policy CR — applied to drive the scoring engine.
  - policy.yaml
