---
# Cluster-scoped MCPGovernancePolicy that drives the scoring engine.
# Tuned for kagent-flux-lab's current state — we declare what we ARE
# doing today (agentgateway routing, TLS, hardened deployment) and leave
# the not-yet-implemented controls (JWT, RBAC, CORS, rate limit) off so
# the score reflects achievable baseline rather than aspirational gaps.
#
# As lab matures (JWT auth via kagent OAuth backend, CEL RBAC policies
# on tool access, CORS for browser-side agents), flip the matching
# require* booleans to true and re-score.
#
# AI agent enabled: forwards governance state to local Ollama at
# host.docker.internal:11434 (qwen2.5:14b). The model adds reasoning +
# actionable suggestions on top of the algorithmic score.
apiVersion: governance.mcp.io/v1alpha1
kind: MCPGovernancePolicy
metadata:
  name: kagent-flux-lab-policy
  labels:
    app.kubernetes.io/part-of: kagent-flux-lab
spec:
  # Architectural controls — these we have implemented:
  requireAgentGateway: true
  requireTLS: true
  requireHardenedDeployment: true

  # Not yet implemented in this lab — surface as gaps in score:
  requireJWTAuth: false
  requireRBAC: false
  requireCORS: false
  requireRateLimit: false
  requirePromptGuard: false # doc-writer-mcp has L1/L5 internally, but no
                            # cluster-level prompt-guard policy CRD yet

  scanInterval: "5m"
  maxToolsWarning: 10
  maxToolsCritical: 15

  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - local-path-storage
    - flux-system

  aiAgent:
    enabled: true
    provider: ollama
    model: qwen2.5:14b
    # Ollama runs on the OrbStack host (not in-cluster). All three OrbStack
    # DNS aliases resolve to the same VM gateway IP (0.250.250.254):
    # host.docker.internal / host.orb.internal / host.lima.internal.
    # We use host.docker.internal for broadest compatibility — kind /
    # OrbStack / Docker Desktop all support it.
    ollamaEndpoint: "http://host.docker.internal:11434"
    scanInterval: "5m"
    scanEnabled: true
