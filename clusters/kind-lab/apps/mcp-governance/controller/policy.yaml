---
# Cluster-scoped MCPGovernancePolicy that drives the scoring engine.
# Tightened to "OWASP MCP Tier 1 aspirational" — flips all 9 controls
# to true so the score reflects the gap between current lab state and
# production-grade security baseline. Expected: score drops from 100
# (everything we declared, we have) to something like 30-60 (revealing
# JWT/RBAC/CORS/rate-limit gaps we have not yet addressed).
#
# This is the educational view — see what work remains to be production
# ready. To re-score against minimal baseline (current implementations
# only), flip require* of NOT-YET-implemented controls back to false.
#
# AI agent enabled: forwards governance state to local Ollama at
# host.docker.internal:11434 (qwen2.5:14b). The model adds reasoning +
# actionable suggestions on top of the algorithmic score.
apiVersion: governance.mcp.io/v1alpha1
kind: MCPGovernancePolicy
metadata:
  name: kagent-flux-lab-policy
  labels:
    app.kubernetes.io/part-of: kagent-flux-lab
spec:
  # OWASP MCP Tier 1 — all required for production readiness.
  # Current lab state: we have agentgateway routing + TLS + hardened
  # deployment. The other 5 controls are tracking-as-gap.
  requireAgentGateway: true
  requireTLS: true
  requireHardenedDeployment: true
  requireJWTAuth: true
  requireRBAC: true
  requireCORS: true
  requireRateLimit: true
  requirePromptGuard: true

  scanInterval: "5m"
  maxToolsWarning: 10
  maxToolsCritical: 15

  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - local-path-storage
    - flux-system

  aiAgent:
    enabled: true
    provider: ollama
    model: qwen2.5:14b
    # Ollama runs on the OrbStack host (not in-cluster). All three OrbStack
    # DNS aliases resolve to the same VM gateway IP (0.250.250.254):
    # host.docker.internal / host.orb.internal / host.lima.internal.
    # We use host.docker.internal for broadest compatibility — kind /
    # OrbStack / Docker Desktop all support it.
    ollamaEndpoint: "http://host.docker.internal:11434"
    scanInterval: "5m"
    scanEnabled: true
