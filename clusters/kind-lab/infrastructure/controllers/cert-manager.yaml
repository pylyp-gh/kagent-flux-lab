---
# cert-manager — provides Certificate / Issuer CRDs + reconciliation loop
# that issues TLS secrets from the chosen CA. In lab — self-signed root CA
# (configs/cert-manager-issuers.yaml).
#
# Why HTTPS is needed: kagent UI uses crypto.randomUUID() from the Web Crypto API,
# which is only available in a Secure Context (HTTPS, or localhost exception).
# Over http://kagent.ash.ph.lab on kind-lab — insecure → API undefined → UI crash.
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: cert-manager
spec:
  interval: 1h
  url: https://charts.jetstack.io
  type: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.16.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # CRDs installed via chart (standard path for v1.15+)
    crds:
      enabled: true
      keep: true

---
# trust-manager (cert-manager subproject) — distributes trust bundles to ConfigMaps
# in designated namespaces. Allows pods in any ns to trust the lab CA for
# in-cluster HTTPS communication without manual cert mounts.
#
# Use case: kagent agent pods → HTTPS to agentgateway-proxy.
# Bundle merges lab-ca + system CAs → ConfigMap in kagent ns →
# pods mount + SSL_CERT_FILE env var.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 5m
  releaseName: trust-manager
  chart:
    spec:
      chart: trust-manager
      version: "v0.18.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Default Trust namespace — where trust-manager reads the `default-package` ConfigMap (system CAs).
    app:
      trust:
        namespace: cert-manager
