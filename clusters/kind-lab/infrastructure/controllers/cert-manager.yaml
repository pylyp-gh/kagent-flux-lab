---
# cert-manager — provides Certificate / Issuer CRDs + reconciliation loop
# що видає TLS секрети з обраного CA. У lab — self-signed root CA
# (configs/cert-manager-issuers.yaml).
#
# Чому потрібен HTTPS: kagent UI використовує crypto.randomUUID() з Web Crypto API,
# який доступний ТІЛЬКИ у Secure Context (HTTPS, або localhost виняток).
# Через http://kagent.ash.ph.lab на kind-lab — insecure → API undefined → UI crash.
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: cert-manager
spec:
  interval: 1h
  url: https://charts.jetstack.io
  type: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.16.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # CRDs встановлюються через chart саме (стандартний шлях для v1.15+)
    crds:
      enabled: true
      keep: true

---
# trust-manager (subproject cert-manager) — distributes trust bundles до ConfigMaps
# у designated namespaces. Дозволяє pod'ам у будь-якій ns trust'ити lab CA для
# in-cluster HTTPS зв'язку без manual cert mounts.
#
# Use case: kagent agent pods → HTTPS до agentgateway-proxy.
# Bundle merges lab-ca + system CAs → ConfigMap у kagent ns →
# pods mount + SSL_CERT_FILE env var.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 5m
  releaseName: trust-manager
  chart:
    spec:
      chart: trust-manager
      version: "v0.18.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Default Trust namespace — звідки trust-manager читає `default-package` ConfigMap (system CAs).
    app:
      trust:
        namespace: cert-manager
