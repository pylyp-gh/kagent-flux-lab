---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api
  namespace: gateway-api
spec:
  interval: 1h
  url: https://github.com/kubernetes-sigs/gateway-api
  ref:
    tag: v1.5.0
  sparseCheckout:
    - config/crd/standard
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api
  namespace: gateway-api
spec:
  interval: 1h
  retryInterval: 1m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: gateway-api
  path: ./config/crd/standard
