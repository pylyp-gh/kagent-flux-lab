---
# trust-manager Bundle — об'єднує lab-ca + system CAs у єдиний bundle,
# розповсюджується як ConfigMap у вибрані ns.
#
# Sources:
#   - useDefaultCAs: true — Mozilla system CA bundle (для HTTPS до external endpoints)
#   - secret: lab-ca-key-pair — наш self-signed CA з cert-manager ns
#
# Target: ConfigMap lab-ca-bundle ключ ca.crt у ns kagent + agentgateway-system.
# Namespace selection через built-in label kubernetes.io/metadata.name.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: lab-ca-bundle
spec:
  sources:
    - useDefaultCAs: true
    - secret:
        name: lab-ca-key-pair
        key: ca.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - kagent
            - agentgateway-system
