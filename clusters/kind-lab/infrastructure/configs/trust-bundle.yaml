---
# trust-manager Bundle — merges lab-ca + system CAs into a single bundle,
# distributed as a ConfigMap to selected namespaces.
#
# Sources:
#   - useDefaultCAs: true — Mozilla system CA bundle (for HTTPS to external endpoints)
#   - secret: lab-ca-key-pair — our self-signed CA from the cert-manager ns
#
# Target: ConfigMap lab-ca-bundle key ca.crt in ns kagent +
# agentgateway-system + ingest-orchestrator (Lab 4 custom A2A agent that
# does outbound TLS to the gateway for both LLM and MCP traffic).
# Namespace selection via built-in label kubernetes.io/metadata.name.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: lab-ca-bundle
spec:
  sources:
    - useDefaultCAs: true
    - secret:
        name: lab-ca-key-pair
        key: ca.crt
  target:
    configMap:
      key: ca.crt
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - kagent
            - agentgateway-system
            - ingest-orchestrator
