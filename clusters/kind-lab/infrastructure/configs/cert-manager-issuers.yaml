---
# Self-signed CA pattern for lab:
#
# 1. selfsigned-bootstrap — ClusterIssuer that self-signs (bootstrap step)
# 2. lab-ca — Certificate (root CA), signed by bootstrap → produces key pair in Secret
# 3. lab-ca (ClusterIssuer) — uses the lab-ca Secret to sign application certs
#
# Browser warnings for self-signed CA are expected in lab. You can import
# lab-ca-key-pair.crt into Keychain → trust → no more warnings (advanced).

---
# Step 1: Bootstrap issuer — self-signs anything
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}

---
# Step 2: Root CA Certificate — signed by bootstrap → produces TLS secret
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: kind-lab Root CA
  secretName: lab-ca-key-pair
  duration: 8760h0m0s # 1 year
  renewBefore: 720h0m0s # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3: Real ClusterIssuer that uses lab-ca for signing
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-ca-key-pair
