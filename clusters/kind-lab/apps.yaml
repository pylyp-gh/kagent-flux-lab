---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-base
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/base
  prune: true
  wait: true
  dependsOn:
    - name: infra-configs
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/agentgateway/controller
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
    - name: gateway-api
      namespace: agentgateway-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: agentgateway
      namespace: agentgateway-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: agentgateway-crds
      namespace: agentgateway-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway-routes
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/agentgateway/routes
  prune: true
  wait: true
  dependsOn:
    - name: agentgateway-controller
---
# Stub Secrets for kagent agents — applied BEFORE kagent-controller (Helm)
# so Secrets exist by the time Agent CRDs created by the HelmRelease spawn
# pods that reference them. Without this split, HelmRelease.wait blocks
# install (pods CrashLoop without Secret) → Stalled.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-stubs
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/stubs
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/controller
  prune: true
  wait: true
  dependsOn:
    - name: agentgateway-routes
    - name: kagent-stubs
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kagent-crds
      namespace: kagent
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kagent
      namespace: kagent
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-config
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/config
  prune: true
  wait: true
  dependsOn:
    - name: kagent-controller
---
# Headlamp — Kubernetes web UI with Flux plugin. Exposed via gateway at
# https://flux.ash.ph.lab. Depends on apps-base for the headlamp ns and
# gateway-api for the HTTPRoute CRD (referenced from the same git path).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/headlamp/controller
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
    - name: gateway-api
      namespace: agentgateway-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: headlamp
      namespace: headlamp
---
# Qdrant — in-cluster vector database for semantic search. Seeded by the
# doc2vec embedding Job (separate Kustomization); read by querydoc MCP
# server (kagent subchart). Depends only on apps-base for the namespace —
# no gateway dependency; querydoc/writer reach Qdrant via internal
# Service DNS, no HTTPRoute needed for cluster-internal traffic.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qdrant-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/qdrant/controller
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: qdrant
      namespace: qdrant
---
# Initial vector DB population — clones the kagent-flux-lab repo and
# runs the doc2vec writer as a one-shot K8s Job, populating the
# `kagent-flux-lab` and `kagent-flux-lab-code` Qdrant collections.
# Replaces the host-side docker run workflow with a fully Flux-managed
# init step — the entire lab reproducible from `flux bootstrap`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qdrant-embeddings
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/qdrant-embeddings
  prune: true
  wait: false # Job completion takes minutes; don't block downstream Kustomizations
  dependsOn:
    - name: qdrant-controller
