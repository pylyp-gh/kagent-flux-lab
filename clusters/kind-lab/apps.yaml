---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-base
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/base
  prune: true
  wait: true
  dependsOn:
    - name: infra-configs
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/agentgateway/controller
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
    - name: gateway-api
      namespace: agentgateway-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: agentgateway
      namespace: agentgateway-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: agentgateway-crds
      namespace: agentgateway-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway-routes
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/agentgateway/routes
  prune: true
  wait: true
  dependsOn:
    - name: agentgateway-controller
---
# Stub Secrets для kagent agents — applied BEFORE kagent-controller (Helm)
# щоб Secrets exist до того як Agent CRDs створюються через HelmRelease →
# pods spawn → namesly need Secret. Без цього split'у HelmRelease.wait блокує
# install (pods CrashLoop без Secret) → Stalled.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-stubs
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/stubs
  prune: true
  wait: true
  dependsOn:
    - name: apps-base
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-controller
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/controller
  prune: true
  wait: true
  dependsOn:
    - name: agentgateway-routes
    - name: kagent-stubs
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kagent-crds
      namespace: kagent
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kagent
      namespace: kagent
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent-config
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps/kagent/config
  prune: true
  wait: true
  dependsOn:
    - name: kagent-controller
