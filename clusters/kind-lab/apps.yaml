apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kind-lab/apps
  prune: true
  wait: true
  dependsOn:
    - name: infra-configs
    - name: gateway-api
      namespace: gateway-api
